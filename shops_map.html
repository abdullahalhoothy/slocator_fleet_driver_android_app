    L.circleMarker([s.lat, s.lng], {
      radius: 3, color: '#2a6', weight: 1, fillColor: '#2a6', fillOpacity: 0.8,
    }).bindTooltip(s.name, { sticky: true }).addTo(map);
    allBounds.push([s.lat, s.lng]);
  });
  stats.innerHTML = `<div class="stat"><b>${PAYLOAD.shops.length}</b> shops</div>`;
} else if (PAYLOAD.mode === 'clusters') {
  const clusterLayers = {};
  PAYLOAD.clusters.forEach(cl => {
    const grp = L.layerGroup().addTo(map);
    clusterLayers[cl.cluster_index] = grp;

    if (cl.hull && cl.hull.length >= 3) {
      L.polygon(cl.hull, {
        color: cl.color, weight: 1.5, fillColor: cl.color, fillOpacity: 0.12,
        interactive: false,
      }).addTo(grp);
      cl.hull.forEach(p => allBounds.push(p));
    }
    L.circleMarker([cl.centroid_lat, cl.centroid_lng], {
      radius: 8, color: '#222', weight: 2, fillColor: cl.color, fillOpacity: 1,
    }).bindTooltip(`<b>Centroid — Cluster ${cl.cluster_index}</b>`, { sticky: true }).addTo(grp);
    allBounds.push([cl.centroid_lat, cl.centroid_lng]);

    cl.shops.forEach(s => {
      L.circleMarker([s.lat, s.lng], {
        radius: 3, color: cl.color, weight: 1, fillColor: cl.color, fillOpacity: 0.85,
      }).bindTooltip(s.name, { sticky: true }).addTo(grp);
      allBounds.push([s.lat, s.lng]);
    });

    const row = document.createElement('div');
    row.className = 'cl-row';
    row.innerHTML =
      `<span class="swatch" style="background:${cl.color}"></span>` +
      `Cluster ${cl.cluster_index} ` +
      `<span style="color:#666;font-weight:400">(${cl.num_shops} shops, ` +
      `avg ${cl.avg_dist_km.toFixed(2)} km)</span>`;
    row.addEventListener('click', () => {
      if (map.hasLayer(grp)) { map.removeLayer(grp); row.classList.add('vis-off'); }
      else { grp.addTo(map); row.classList.remove('vis-off'); }
    });
    legend.appendChild(row);
  });
  const totalShops = PAYLOAD.clusters.reduce((s, c) => s + c.num_shops, 0);
  stats.innerHTML =
    `<div class="stat"><b>${PAYLOAD.clusters.length}</b> clusters</div>` +
    `<div class="stat"><b>${totalShops}</b> shops clustered</div>`;
}

if (allBounds.length) map.fitBounds(L.latLngBounds(allBounds).pad(0.04));
</script>
</body>
</html>
