  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
    #map { height: 100vh; }
    #panel {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: white; padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.25); max-height: 90vh;
      overflow-y: auto; min-width: 240px; max-width: 290px;
    }
    #panel h3 { margin: 0 0 8px; font-size: 14px; }
    #toggle-btn {
      display: block; width: 100%; margin-bottom: 10px; padding: 5px 8px;
      font-size: 12px; cursor: pointer; border: 1px solid #ccc;
      border-radius: 5px; background: #f7f7f7;
    }
    #toggle-btn:hover { background: #e8e8e8; }
    .cl-header {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 2px; border-radius: 4px;
      font-size: 12px; font-weight: 600; user-select: none;
    }
    .cl-header:hover { background: #f0f0f0; }
    .cl-header.vis-off { opacity: 0.4; }
    .cl-eye { cursor: pointer; font-size: 13px; flex-shrink: 0; }
    .cl-arrow { cursor: pointer; flex: 1; display: flex; align-items: center; gap: 6px; }
    .swatch { width: 20px; height: 4px; border-radius: 2px; flex-shrink: 0; }
    .route-list { display: none; padding-left: 14px; }
    .route-list.open { display: block; }
    .route-item {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 4px; border-radius: 4px;
      font-size: 11px; cursor: pointer; user-select: none; color: #333;
    }
    .route-item:hover { background: #f0f0f0; }
    .route-item.active { background: #e8f0fe; font-weight: 600; }
    .route-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>

const allBounds = [];
const clusterGroups = {};
const hullLayers   = {};
const routeRegistry = [];

let straightMode   = false;
let activeRouteKey = null;

const DEG = Math.PI / 180;

function _haversineM(p1, p2) {
  const R = 6371000;
  const dLat = (p2[0] - p1[0]) * DEG, dLng = (p2[1] - p1[1]) * DEG;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(p1[0]*DEG) * Math.cos(p2[0]*DEG) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function _bearing(p1, p2) {
  const lat1 = p1[0]*DEG, lat2 = p2[0]*DEG, dLng = (p2[1]-p1[1])*DEG;
  return Math.atan2(
    Math.sin(dLng) * Math.cos(lat2),
    Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng)
  ) * 180 / Math.PI;
}

function _intervalPositions(latlngs, intervalM) {
  const result = [];
  let accumulated = 0, next = intervalM / 2;
  for (let i = 0; i < latlngs.length - 1; i++) {
    const p1 = latlngs[i], p2 = latlngs[i + 1];
    const segLen = _haversineM(p1, p2);
    if (segLen < 1) continue;
    const angle = _bearing(p1, p2);
    while (accumulated + segLen >= next) {
      const t = (next - accumulated) / segLen;
      result.push({ latlng: [p1[0] + t*(p2[0]-p1[0]), p1[1] + t*(p2[1]-p1[1])], angle });
      next += intervalM;
    }
    accumulated += segLen;
  }
  return result;
}

function _perSegmentPositions(latlngs) {
  const result = [];
  for (let i = 0; i < latlngs.length - 1; i++) {
    const p1 = latlngs[i], p2 = latlngs[i + 1];
    if (_haversineM(p1, p2) < 1) continue;
    result.push({
      latlng: [(p1[0]+p2[0])/2, (p1[1]+p2[1])/2],
      angle: _bearing(p1, p2),
    });
  }
  return result;
}

function makeArrowIcon(color, angle) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="-7 -7 14 14"
    style="transform:rotate(${angle}deg);display:block">
    <polygon points="0,-6 5,4 0,1 -5,4" fill="${color}" stroke="white" stroke-width="0.8" opacity="0.95"/>
  </svg>`;
  return L.divIcon({ className: '', html: svg, iconSize: [14,14], iconAnchor: [7,7] });
}

const ARROW_INTERVAL_M = 500;

function buildArrows(latlngs, color, grp, perSegment) {
  const positions = perSegment
    ? _perSegmentPositions(latlngs)
    : _intervalPositions(latlngs, ARROW_INTERVAL_M);
  return positions.map(({ latlng, angle }) =>
    L.marker(latlng, { icon: makeArrowIcon(color, angle), interactive: false }).addTo(grp)
  );
}

function replaceArrows(entry, latlngs, perSegment) {
  entry.arrowMarkers.forEach(m => entry.grp.removeLayer(m));
  entry.arrowMarkers = buildArrows(latlngs, entry.color, entry.grp, perSegment);
  if (activeRouteKey !== null) {
    const isActive = activeRouteKey === `${entry.clusterIdx}-${entry.routeIdx}`;
    entry.arrowMarkers.forEach(m => m.setOpacity(isActive ? 0.95 : 0));
  }
}

    hullLayers[idx] = L.polygon(cluster.hull, {
      color, weight: 1.5, fillColor: color, fillOpacity: 0.08, interactive: false,
    }).addTo(grp);
    cluster.hull.forEach(p => allBounds.push(p));
  }

  L.circleMarker([cluster.driver_start_lat, cluster.driver_start_lng], {
    radius: 7, color: '#222', weight: 2, fillColor: color, fillOpacity: 1,
  }).bindTooltip(`<b>Depot — Cluster ${idx}</b>`, { sticky: true }).addTo(grp);
  allBounds.push([cluster.driver_start_lat, cluster.driver_start_lng]);

  cluster.routes.forEach((route, ri) => {
    const dayLabel = `Day ${ri + 1}`;
    const polyline = L.polyline(route.polyline, {
      color, weight: 2.5, opacity: 0.85,
    }).bindPopup(
      `<b>Cluster ${idx} &middot; ${dayLabel}</b><br>` +
      `Stops: ${route.num_stops}<br>` +
      `Duration: ${(route.total_time_seconds / 60).toFixed(1)} min<br>` +
      `Distance: ${route.total_distance_km} km`
    ).addTo(grp);

    route.polyline.forEach(p => allBounds.push(p));

    const stopMarkers = route.stops.map((stop, i) =>
      L.circleMarker([stop.lat, stop.lng], {
        radius: 4, color, weight: 1.5, fillColor: '#fff', fillOpacity: 1,
      }).bindTooltip(
        `<b>${i + 1}. ${stop.name}</b><br>Cluster ${idx} &middot; ${dayLabel}`,
        { sticky: true }
      ).addTo(grp)
    );

    const arrowMarkers = buildArrows(route.polyline, color, grp);

    routeRegistry.push({
      clusterIdx: idx, routeIdx: route.route_index, color, grp,
      polyline, stopMarkers, arrowMarkers,
      road: route.polyline, straight: route.straight,
    });
  });
});

if (allBounds.length) map.fitBounds(L.latLngBounds(allBounds).pad(0.04));

function resetHighlight() {
  routeRegistry.forEach(r => {
    r.polyline.setStyle({ opacity: 0.85, weight: 2.5 });
    r.arrowMarkers.forEach(m => m.setOpacity(0.95));
    r.stopMarkers.forEach(m => m.setStyle({ opacity: 1, fillOpacity: 1 }));
  });
  Object.values(hullLayers).forEach(h => h.setStyle({ opacity: 1, fillOpacity: 0.08 }));
  activeRouteKey = null;
}

function highlightRoute(clusterIdx, routeIdx, legendEl) {
  const key = `${clusterIdx}-${routeIdx}`;
  if (activeRouteKey === key) { resetHighlight(); updateLegendActive(null); return; }
  activeRouteKey = key;
  routeRegistry.forEach(r => {
    const on = r.clusterIdx === clusterIdx && r.routeIdx === routeIdx;
    r.polyline.setStyle({ opacity: on ? 0.95 : 0.05, weight: on ? 3.5 : 2.5 });
    r.arrowMarkers.forEach(m => m.setOpacity(on ? 0.95 : 0));
    r.stopMarkers.forEach(m => m.setStyle({ opacity: on ? 1 : 0.05, fillOpacity: on ? 1 : 0.05 }));
  });
  Object.values(hullLayers).forEach(h => h.setStyle({ opacity: 0.05, fillOpacity: 0.02 }));
  if (hullLayers[clusterIdx]) hullLayers[clusterIdx].setStyle({ opacity: 0.6, fillOpacity: 0.06 });
  updateLegendActive(legendEl);
}

function updateLegendActive(el) {
  document.querySelectorAll('.route-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
}

function fmtDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.round((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m} min`;
}

const legend = document.getElementById('legend');

DATA.forEach(cluster => {
  const { color, cluster_index: idx, num_routes, total_distance_km } = cluster;
  const header = document.createElement('div');
  header.className = 'cl-header';
  header.innerHTML =
    `<span class="cl-eye" title="Toggle visibility">&#128065;</span>` +
    `<span class="cl-arrow">` +
      `<span class="swatch" style="background:${color}"></span>` +
      `Cluster ${idx} <span style="color:#999;font-weight:400">${num_routes}r</span>` +
      ` <span style="color:#777;font-weight:400;font-size:10px">${total_distance_km} km</span>` +
      ` <span style="color:#bbb;font-size:10px">&#9660;</span>` +
    `</span>`;
  legend.appendChild(header);
  const routeList = document.createElement('div');
  routeList.className = 'route-list';
  legend.appendChild(routeList);
  header.querySelector('.cl-eye').addEventListener('click', e => {
    e.stopPropagation();
    const grp = clusterGroups[idx];
    if (map.hasLayer(grp)) { map.removeLayer(grp); header.classList.add('vis-off'); }
    else { grp.addTo(map); header.classList.remove('vis-off'); }
  });
  header.querySelector('.cl-arrow').addEventListener('click', () => {
    routeList.classList.toggle('open');
  });
  cluster.routes.forEach((route, ri) => {
    const dayLabel = `Day ${ri + 1}`;
    const item = document.createElement('div');
    item.className = 'route-item';
    item.innerHTML =
      `<span class="route-dot" style="background:${color}"></span>` +
      `${dayLabel} <span style="color:#999;font-weight:400">${route.num_stops} loc</span>` +
      `<span style="color:#555;margin-left:auto">${fmtDuration(route.total_time_seconds)}</span>` +
      `<span style="color:#777;margin-left:5px;font-size:10px">${route.total_distance_km} km</span>`;
    item.addEventListener('click', () => highlightRoute(idx, route.route_index, item));
    routeList.appendChild(item);
  });
});

document.getElementById('toggle-btn').addEventListener('click', function () {
  straightMode = !straightMode;
  routeRegistry.forEach(r => {
    const coords = straightMode ? r.straight : r.road;
    r.polyline.setLatLngs(coords);
    replaceArrows(r, coords, straightMode);
  });
  this.textContent = straightMode ? '\u8646 Road routes' : '\u8646 Straight lines';
});
</script>
</body>
</html>
